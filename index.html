<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DubAI：AI Builders 资讯与主流 AI 工具导航。" />
    <title>DubAI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="DubAI 首页">
        <img class="brand-mark" src="./assets/dubai-logo.png" alt="" width="32" height="32" />
        <span>DubAI</span>
      </a>
      <nav class="nav" aria-label="主导航">
        <a href="#news">AI Builders</a>
        <a href="#tools">AI 工具</a>
      </nav>
    </header>

    <main id="top">
      <section class="hero" aria-labelledby="hero-title">
        <h1 id="hero-title">真正的 AI，不是让普通人学会更多工具，<span class="hero-gradient">而是把行业里的技术门槛一点点抹平。</span></h1>
      </section>

      <section id="news" class="section news-section" aria-labelledby="news-title">
        <div class="section-intro">
          <h2 id="news-title">AI Builders 资讯</h2>
          <div class="feed-toolbar">
            <div class="feed-controls" aria-label="资讯筛选">
              <button class="feed-filter active" data-filter="all" type="button">全部</button>
              <button class="feed-filter feed-filter-x" data-filter="x" type="button" aria-label="X观点">𝕏</button>
              <button class="feed-filter" data-filter="podcast" type="button">播客</button>
              <button class="feed-filter" data-filter="blog" type="button">博客</button>
            </div>
            <div class="feed-head">
              <span class="live-dot" aria-hidden="true"></span>
              <span class="feed-label">Follow Builders</span>
            </div>
          </div>
        </div>

        <div class="feed-panel">
          <div class="feed-grid" id="feedGrid">
            <article class="feed-card skeleton"><span></span><strong></strong><p></p></article>
            <article class="feed-card skeleton"><span></span><strong></strong><p></p></article>
            <article class="feed-card skeleton"><span></span><strong></strong><p></p></article>
          </div>
        </div>
      </section>

      <section id="tools" class="section tools-section" aria-labelledby="tools-title">
        <div class="section-intro">
          <h2 id="tools-title">AI 工具</h2>
        </div>

        <div class="tool-list">
          <a class="tool-item" href="#" aria-label="ChatGPT">
            <span class="tool-logo logo-chatgpt">◎</span>
            <span class="tool-name">ChatGPT</span>
          </a>
          <a class="tool-item" href="#" aria-label="Gemini">
            <span class="tool-logo logo-gemini">Gemini</span>
            <span class="tool-name">Gemini</span>
          </a>
          <a class="tool-item" href="#" aria-label="Claude">
            <span class="tool-logo logo-claude">AI</span>
            <span class="tool-name">Claude</span>
          </a>
          <a class="tool-item" href="#" aria-label="Mistral">
            <span class="tool-logo logo-mistral">M</span>
            <span class="tool-name">Mistral</span>
          </a>
          <a class="tool-item" href="#" aria-label="Llama">
            <span class="tool-logo logo-llama">∞</span>
            <span class="tool-name">Llama</span>
          </a>
          <a class="tool-item" href="#" aria-label="Grok xAI">
            <span class="tool-logo logo-grok">/</span>
            <span class="tool-name">Grok xAI</span>
          </a>
        </div>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
